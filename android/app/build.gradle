plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.risa.app"
    // Use an explicit compileSdk to satisfy newer AndroidX library requirements
    // (some updated plugins require compileSdk 34+). Set to 36 to be safe.
    compileSdk 36
    ndkVersion flutter.ndkVersion
    
    // Handle dependency conflicts
    configurations.all {
        resolutionStrategy {
            force 'org.tensorflow:tensorflow-lite-api:2.14.0'
            force 'org.tensorflow:tensorflow-lite-gpu:2.14.0'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId "com.risa.app"
        minSdkVersion flutter.minSdkVersion
        // Match compileSdk with a modern target to satisfy updated dependencies.
        targetSdk 36
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "com.google.android.play:core:1.10.3"
    implementation "androidx.media3:media3-exoplayer:1.2.1"
    implementation "androidx.media3:media3-exoplayer-smoothstreaming:1.2.1"
}
