plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.risa.app"
    // Use an explicit compileSdk to satisfy newer AndroidX library requirements
    // (some updated plugins require compileSdk 34+). Set to 36 to be safe.
    compileSdk 36
    ndkVersion "29.0.13113456"
    
    // Enable R8 full mode for maximum optimization
    buildFeatures {
        buildConfig = true
    }
    
    // Handle dependency conflicts
    configurations.all {
        resolutionStrategy {
            force 'org.tensorflow:tensorflow-lite-api:2.14.0'
            force 'org.tensorflow:tensorflow-lite-gpu:2.14.0'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId "com.risa.app"
        minSdkVersion 26
        targetSdk 36
        versionCode 20
        versionName "1.9.1"
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
        

    }

    packagingOptions {
        jniLibs {
            // Force legacy extraction so ndk-translation can load ARM libs on x86 emulators
            useLegacyPackaging true
        }
    }

    // externalNativeBuild {
    //     cmake {
    //         path "src/main/cpp/CMakeLists.txt"
    //     }
    // }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            applicationVariants.all { variant ->
                variant.outputs.all {
                    outputFileName = "Risa-${variant.versionName}.apk"
                }
            }
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "com.google.android.play:core:1.10.3"
    implementation "androidx.media3:media3-exoplayer:1.2.1"
    implementation "androidx.media3:media3-exoplayer-smoothstreaming:1.2.1"
    implementation "androidx.media3:media3-ui:1.2.1"
    implementation "androidx.media:media:1.7.0"
}
