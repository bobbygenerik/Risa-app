name: iptv_player
description: "A modern IPTV streaming player application built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Video Player
  video_player: ^2.9.2
  chewie: ^1.8.5
  
  # Network & HTTP
  http: ^1.2.2
  dio: ^5.7.0
  
  # State Management
  provider: ^6.1.2
  
  # EPG (Electronic Program Guide) & XML Parsing
  xml: ^6.5.0
  
  # Storage & Caching
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  
  # Utilities
  intl: ^0.20.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
  #   - assets/icons/
