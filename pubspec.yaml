name: iptv_player
description: "A modern IPTV streaming player application built with Flutter - Risa IPTV Player."
publish_to: 'none'
# Version format: MAJOR.MINOR.PATCH+BUILD_NUMBER
version: 1.9.6+1

# Environment constraints - validated by Flutter tooling
# SDK constraint format: ">=MIN_VERSION <MAX_VERSION"
# Flutter pub will validate this when resolving dependencies
environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local persistence for large playlists/EPG (DB-backed paging)
  sqflite: ^2.3.3

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  dio: ^5.7.0
  crypto: ^3.0.7
  provider: ^6.1.5+1
  xml: ^6.5.0
  shared_preferences: ^2.2.2
  path: ^1.8.3
  path_provider: ^2.1.2

  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  go_router: ^17.0.1
  intl: ^0.20.2
  wakelock_plus: ^1.2.8
  better_player: ^0.0.83


  animations: ^2.0.11
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1
  file_picker: ^10.3.7
  flutter_svg: ^2.0.7
  image: ^4.0.17

  google_mlkit_translation: ^0.13.0  # On-device translation (auto-downloads language packs) - TRUE OFFLINE
  google_mlkit_language_id: ^0.13.0  # On-device text language identification
  record: ^6.1.2  # Audio recording for transcription
  linked_scroll_controller: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.3
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  image_path: "assets/images/lonelogo (1).png"
  # Match app dark theme background for adaptive icon
  adaptive_icon_background: "#1C1C1E"
  adaptive_icon_foreground: "assets/images/lonelogo (1).png"
  web:
    generate: true
    image_path: "assets/images/lonelogo (1).png"
    background_color: "#1C1C1E"
    theme_color: "#1C1C1E"
