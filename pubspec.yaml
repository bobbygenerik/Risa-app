name: iptv_player
description: "A modern IPTV streaming player application built with Flutter - Stream Hub."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Video players
  video_player: ^2.9.2  # Android, iOS, Web support
  chewie: ^1.8.5  # Video player UI
  http: ^1.2.2
  dio: ^5.7.0
  provider: ^6.1.2
  xml: ^6.5.0
  shared_preferences: ^2.3.3
  path: ^1.9.1
  path_provider: ^2.1.5
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  go_router: ^14.6.2
  intl: ^0.20.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.12
  animations: ^2.0.11
  cached_network_image: ^3.4.1
  file_picker: ^8.1.6
  
  # Google Drive Integration (FREE - uses user's storage)
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  google_sign_in: ^6.2.2
  
  # On-Device AI Upscaling (FREE - no cloud costs) - DISABLED for web
  # tflite_flutter: ^0.11.0  # DISABLED: FFI not supported on web
  image: ^4.3.0

  # Optional/native media plugins referenced in the codebase
  # media_kit: any  # DISABLED: causes CMake errors on Linux
  # media_kit_video: any  # DISABLED: causes CMake errors on Linux
  # flutter_vlc_player: any  # DISABLED: use video_player instead
  # vosk_flutter: any  # OPTIONAL: removed to avoid forcing transitive downgrades
  
  # Subtitles & Multiple Audio Tracks - REMOVED subtitle_wrapper_package (causes UnimplementedError on Linux)
  # subtitle_wrapper_package: ^2.0.2  # DISABLED - use native video_player subtitles instead
  
  # Picture-in-Picture (Android native implementation)
  # Will use platform channels for Android PiP
  
  # On-Device Transcription & Translation
  # NOTE: speech_to_text uses platform APIs (requires internet, may incur costs)
  # For TRUE on-device: manually add vosk_flutter (requires downgrading dependencies)
  flutter_tts: ^4.2.0  # Text-to-speech for translated audio  
  google_mlkit_translation: ^0.11.0  # On-device translation (auto-downloads language packs) - TRUE OFFLINE
  record: ^6.0.0  # Audio recording for transcription

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # Assets for AI Upscaling
  assets:
    - assets/models/
    - assets/images/



# App Icon Configuration
flutter_launcher_icons:
  android: true
  image_path: "assets/images/croppedlogo2.png"  # Use transparent logo; background stays white via adaptive
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/croppedlogo2.png"
  web:
    generate: true
    image_path: "assets/images/croppedlogo2.png"
    background_color: "#FFFFFF"
    theme_color: "#C8C6D3"

# Note: dependency_overrides previously pinning `permission_handler` and `http`
# for `vosk_flutter` have been removed. If you need Vosk, re-add it and reintroduce
# appropriate overrides or prefer to add a guarded adapter implementation.
