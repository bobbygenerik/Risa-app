name: iptv_player
description: "A modern IPTV streaming player application built with Flutter - Stream Hub."
publish_to: 'none'
# Version format: MAJOR.MINOR.PATCH+BUILD_NUMBER
version: 1.0.0+1

# Environment constraints - validated by Flutter tooling
# SDK constraint format: ">=MIN_VERSION <MAX_VERSION"
# Flutter pub will validate this when resolving dependencies
environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Video players
  flutter_vlc_player: ^7.4.2  # VLC-based player for better IPTV support
  http: ^1.2.0
  dio: ^5.7.0
  provider: ^6.1.5+1
  xml: ^6.5.0
  shared_preferences: ^2.2.2
  path: ^1.8.3
  path_provider: ^2.1.2

  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  go_router: ^16.1.0
  intl: ^0.20.2


  animations: ^2.0.11
  cached_network_image: ^3.3.1
  file_picker: ^10.3.7

  
  # Cloud sync dependencies removed (Drive integration omitted)
  


  # Optional/native media plugins referenced in the codebase
  # media_kit: any  # DISABLED: causes CMake errors on Linux
  # media_kit_video: any  # DISABLED: causes CMake errors on Linux
  # video_player: ^2.7.2  # DISABLED: switched to VLC for better IPTV support
  # vosk_flutter: any  # OPTIONAL: removed to avoid forcing transitive downgrades
  
  # Subtitles & Multiple Audio Tracks - REMOVED subtitle_wrapper_package (causes UnimplementedError on Linux)
  # subtitle_wrapper_package: ^2.0.2  # DISABLED - use native video_player subtitles instead
  
  # Picture-in-Picture (Android native implementation)
  # Will use platform channels for Android PiP
  
  # On-Device Transcription & Translation
  # NOTE: speech_to_text uses platform APIs (requires internet, may incur costs)
  # For TRUE on-device: manually add vosk_flutter (requires downgrading dependencies)

  google_mlkit_translation: ^0.13.0  # On-device translation (auto-downloads language packs) - TRUE OFFLINE
  google_mlkit_language_id: ^0.13.0  # On-device text language identification
  record: ^6.1.2  # Audio recording for transcription
  # flutter_tts: ^4.0.2  # REMOVED: Text-to-speech not used, was causing plugin errors
  # No stable whisper Flutter packages available - keeping manual implementation

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/



# App Icon Configuration
flutter_launcher_icons:
  android: true
  image_path: "assets/images/lonelogo (1).png"
  # Match app dark theme background for adaptive icon
  adaptive_icon_background: "#1C1C1E"
  adaptive_icon_foreground: "assets/images/lonelogo (1).png"
  web:
    generate: true
    image_path: "assets/images/lonelogo (1).png"
    background_color: "#1C1C1E"
    theme_color: "#1C1C1E"

# Note: dependency_overrides previously pinning `permission_handler` and `http`
# for `vosk_flutter` have been removed. If you need Vosk, re-add it and reintroduce
# appropriate overrides or prefer to add a guarded adapter implementation.
